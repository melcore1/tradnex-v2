# Local development override.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Builds the image locally as `tradnex:dev` and bind-mounts source for fast iteration.
# Runs as host uid:gid (default 1000:1000) so writes to ./data work without chown dance.
# If your host uid is different, set TRADNEX_UID and TRADNEX_GID in .env.

x-dev-overrides: &dev-overrides
  build:
    context: .
    dockerfile: Dockerfile.python
  image: tradnex:dev
  user: "${TRADNEX_UID:-1000}:${TRADNEX_GID:-1000}"
  volumes:
    - ./shared:/app/shared:ro
    - ./services:/app/services:ro
    - ./migrations:/app/migrations:ro
    - ./prompts:/app/prompts:ro
    - ./tests:/app/tests:ro

services:
  data:
    <<: *dev-overrides
  scanner:
    <<: *dev-overrides
  orchestrator:
    <<: *dev-overrides
  api:
    <<: *dev-overrides
  tripwire:
    <<: *dev-overrides

  # Frontend dev override: bind-mount source, run `npm run dev` for HMR.
  # Named volumes for node_modules and .next prevent Linux file-system
  # ownership tangles.
  frontend:
    image: tradnex-frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      target: dev
    command: npm run dev
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
      - ./frontend/middleware.ts:/app/middleware.ts:ro
      - ./frontend/next.config.ts:/app/next.config.ts:ro
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      - ./frontend/components.json:/app/components.json:ro
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE: ""
      API_INTERNAL_URL: http://api:8080
      WATCHPACK_POLLING: "true"  # required for bind-mount HMR on Linux

volumes:
  frontend_node_modules:
  frontend_next_cache:
