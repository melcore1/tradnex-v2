name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, type-check, smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy shared/

      - name: Pytest
        env:
          DATABASE_PATH: /tmp/tradnex_ci.db
        run: pytest tests/ -v
