# Production compose — pulls the image published by GitHub Actions on push to main.
# For local development with bind-mounted source, layer the dev override on top:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

networks:
  tradnex_net:
    driver: bridge

x-python-base: &python-base
  image: ghcr.io/melcore1/tradnex-v2:${IMAGE_TAG:-latest}
  env_file: .env
  environment:
    DATABASE_PATH: /data/tradnex.db
  volumes:
    - ./data:/data
  networks:
    - tradnex_net
  restart: unless-stopped

services:
  data:
    <<: *python-base
    container_name: tradnex_data
    command: python -m services.data.main

  scanner:
    <<: *python-base
    container_name: tradnex_scanner
    command: python -m services.scanner.main
    depends_on:
      - data

  orchestrator:
    <<: *python-base
    container_name: tradnex_orchestrator
    command: python -m services.orchestrator.main
    depends_on:
      - data

  api:
    <<: *python-base
    container_name: tradnex_api
    command:
      - uvicorn
      - services.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    # No public port — Caddy fronts all external traffic. Use the
    # docker-compose.dev-host.yml override to re-expose 8080 for
    # host-side `npm run dev`.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/health',timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - data

  monitor:
    <<: *python-base
    container_name: tradnex_monitor
    command: python -m services.monitor.main
    depends_on:
      - data

  evaluator:
    <<: *python-base
    container_name: tradnex_evaluator
    command: python -m services.evaluator.main
    depends_on:
      - data

  frontend:
    image: ghcr.io/melcore1/tradnex-v2-frontend:${IMAGE_TAG:-latest}
    container_name: tradnex_frontend
    environment:
      # Empty — same-origin via Caddy in production.
      NEXT_PUBLIC_API_BASE: ""
      # Used by Next.js middleware.ts for SSR auth check inside the network.
      API_INTERNAL_URL: http://api:8080
      NODE_ENV: production
    networks:
      - tradnex_net
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: tradnex_caddy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - tradnex_net
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
